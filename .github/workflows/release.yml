name: Release Traffic

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    env:
      QT_VERSION: "6.10.2"
      QT_ARCH: "win64_mingw"
      APP_TARGET: "traffic"
      BUILD_DIR: "build-release"
      DIST_ROOT: "dist"
      DIST_DIR: "dist\\traffic"
      REL_VERSION: ${{ inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (bundled)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.2
          arch: win64_mingw
          modules: qtlocation qtpositioning
          cache: true

      - name: Setup CMake 4.0.2 + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.0.2
          ninjaVersion: latest

      - name: Configure (CMake Release)
        shell: cmd
        run: |
          cmake -S . -B "%BUILD_DIR%" -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        shell: cmd
        run: |
          cmake --build "%BUILD_DIR%" --parallel

      - name: Prepare portable folder (windeployqt)
        shell: cmd
        run: |
          if exist "%DIST_ROOT%" rmdir /S /Q "%DIST_ROOT%"
          mkdir "%DIST_DIR%"

          set "APP_EXE="
          for /r "%BUILD_DIR%" %%F in ("%APP_TARGET%.exe") do (
            set "APP_EXE=%%F"
            goto :found
          )
          :found
          if "%APP_EXE%"=="" (
            echo [ERROR] %APP_TARGET%.exe not found under %BUILD_DIR%
            exit /b 1
          )

          copy /Y "%APP_EXE%" "%DIST_DIR%\\%APP_TARGET%.exe"

          windeployqt --release --no-translations --compiler-runtime --qmldir "%GITHUB_WORKSPACE%" "%DIST_DIR%\\%APP_TARGET%.exe"
          xcopy /E /I /Y "%pythonLocation%" "%DIST_DIR%\py"
          copy /Y "%DIST_DIR%\py\pythonw.exe" "%DIST_DIR%\py\traffic_py.exe"
          if exist "python" xcopy /E /I /Y "python" "%DIST_DIR%\\python"
          if exist "yolo"   xcopy /E /I /Y "yolo"   "%DIST_DIR%\\yolo"
          if exist "config" xcopy /E /I /Y "config" "%DIST_DIR%\\config"

      - name: Create zip
        shell: cmd
        run: |
          echo PACKAGE_NAME=%APP_TARGET%-%REL_VERSION%.zip>>%GITHUB_ENV%
          cmake -E tar cfv "%APP_TARGET%-%REL_VERSION%.zip" --format=zip "%DIST_DIR%"

      - name: Publish GitHub Release (manual or tag)
        shell: cmd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "%REL_VERSION%" >nul 2>nul
          if %errorlevel%==0 (
            gh release upload "%REL_VERSION%" "%PACKAGE_NAME%" --clobber
          ) else (
            gh release create "%REL_VERSION%" "%PACKAGE_NAME%" --title "%REL_VERSION%" --notes "" --target "%GITHUB_SHA%"
          )
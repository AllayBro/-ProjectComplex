name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    env:
      QT_VERSION: "6.10.2"
      QT_ARCH: "win64_mingw"
      APP_TARGET: "traffic"
      BUILD_DIR: "build-${{ matrix.build_type }}"
      BUILD_TYPE: "${{ matrix.build_type }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (bundled)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          architecture: "x64"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python deps
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.2
          arch: win64_mingw
          modules: qtlocation qtpositioning
          cache: true

      - name: Setup CMake 4.0.2 + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.0.2
          ninjaVersion: latest

      - name: Configure (CMake)
        shell: cmd
        run: |
          cmake -S . -B "%BUILD_DIR%" -G Ninja -DCMAKE_BUILD_TYPE=%BUILD_TYPE%

      - name: Build
        shell: cmd
        run: |
          cmake --build "%BUILD_DIR%" --parallel

      - name: Test (ctest)
        shell: cmd
        run: |
          ctest --test-dir "%BUILD_DIR%" -C %BUILD_TYPE% --output-on-failure

      - name: Package portable (Qt + Python)
        if: matrix.build_type == 'Release'
        shell: cmd
        run: |
          if exist dist rmdir /S /Q dist
          mkdir dist\traffic

          set "APP_EXE="
          for /r "%BUILD_DIR%" %%F in ("%APP_TARGET%.exe") do (
            set "APP_EXE=%%F"
            goto :found
          )
          :found
          if "%APP_EXE%"=="" (
            echo [ERROR] %APP_TARGET%.exe not found under %BUILD_DIR%
            exit /b 1
          )

          copy /Y "%APP_EXE%" "dist\traffic\%APP_TARGET%.exe"

          "%QT_ROOT_DIR%\bin\windeployqt.exe" --release --no-translations --compiler-runtime --qmldir "%GITHUB_WORKSPACE%" "dist\traffic\%APP_TARGET%.exe"

          xcopy /E /I /Y "%pythonLocation%" "dist\traffic\py"
          copy /Y "dist\traffic\py\pythonw.exe" "dist\traffic\py\traffic_py.exe"

          if exist "python" xcopy /E /I /Y "python" "dist\traffic\python"
          if exist "yolo"   xcopy /E /I /Y "yolo"   "dist\traffic\yolo"
          if exist "config" xcopy /E /I /Y "config" "dist\traffic\config"

      - name: Upload artifact (Release package)
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: traffic-${{ github.sha }}
          path: dist\traffic\**